name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide=html&disable_animations=true&bg_color=0d1117&title_color=39d353&text_color=8b949e&border_color=30363d
          path: profile/langs.svg
          token: ${{ secrets.PAT_1 }}

      # Guard: se o PAT expirar/rate-limitar, o github-readme-stats devolve um
      # card "Something went wrong". Falha o job aqui para NAO commitar o card de
      # erro por cima dos SVGs bons (a quebra fica visivel em vez de silenciosa).
      - name: Fail if cards are error cards
        run: |
          if grep -l "Something went wrong" profile/langs.svg 2>/dev/null; then
            echo "::error::github-readme-stats returned an error card (PAT_1 invalido/expirado ou rate limit). Nada foi commitado."
            exit 1
          fi
          echo "Cards OK."

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README cards"
          file_pattern: "profile/*.svg"
