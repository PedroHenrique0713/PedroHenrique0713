name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true&bg_color=0d1117&title_color=39d353&text_color=8b949e&icon_color=39d353&border_color=30363d
          path: profile/stats.svg
          token: ${{ secrets.PAT_1 }}

      - name: Generate top langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide=html&bg_color=0d1117&title_color=39d353&text_color=8b949e&border_color=30363d
          path: profile/langs.svg
          token: ${{ secrets.PAT_1 }}

      # O action ignora disable_animations, entao os SVGs saem com texto em
      # opacity:0 + fadeIn/scaleIn. O camo do GitHub nao roda a animacao CSS de
      # forma confiavel e o texto some. Neutraliza aqui: opacity 0 -> 1 e remove
      # as declaracoes de animation (os elementos ficam no estado final, visivel).
      - name: Neutralize CSS animations (camo renders animated text blank)
        run: |
          sed -i -E 's/opacity: ?0;/opacity: 1;/g; s/animation:[^;]*;//g' profile/stats.svg profile/langs.svg
          echo "cards static text OK"

      - name: Fail if cards are error cards
        run: |
          if grep -l "Something went wrong" profile/stats.svg profile/langs.svg 2>/dev/null; then
            echo "::error::github-readme-stats returned an error card (PAT_1 invalido/expirado ou rate limit). Nada foi commitado."
            exit 1
          fi
          echo "Cards OK."

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README cards"
          file_pattern: "profile/*.svg"
